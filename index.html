<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Deep Research Agent · 移动端测试台</title>
<style>
  :root {
    --primary: #4F46E5;
    --primary-light: #818CF8;
    --primary-dark: #3730A3;
    --bg: #0F172A;
    --surface: #1E293B;
    --surface-2: #334155;
    --border: #475569;
    --text: #F1F5F9;
    --text-secondary: #94A3B8;
    --success: #22C55E;
    --warning: #F59E0B;
    --error: #EF4444;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    padding: 16px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(79,70,229,0.3);
  }
  .header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .header .subtitle {
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    margin-top: 2px;
  }

  /* Tab bar */
  .tab-bar {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 68px;
    z-index: 99;
  }
  .tab-btn {
    flex: 1;
    padding: 12px 8px;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    background: none;
    border: none;
    border-bottom: 2.5px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn.active {
    color: var(--primary-light);
    border-bottom-color: var(--primary);
  }
  .tab-btn:active { opacity: 0.7; }

  /* Content */
  .content { flex: 1; display: none; flex-direction: column; }
  .content.active { display: flex; }
  .content.padded { padding: 16px 20px; }

  /* Config tab */
  .config-section { margin-bottom: 20px; }
  .config-section label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .config-section input, .config-section textarea {
    width: 100%;
    padding: 10px 14px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 14px;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  .config-section input:focus, .config-section textarea:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(79,70,229,0.15);
  }
  .config-section textarea {
    resize: vertical;
    min-height: 80px;
    font-size: 13px;
    font-family: "SF Mono", "Cascadia Code", monospace;
  }

  .btn-row { display: flex; gap: 10px; margin-top: 12px; }
  .btn {
    flex: 1;
    padding: 11px 16px;
    border-radius: var(--radius-sm);
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-secondary { background: var(--surface-2); color: var(--text); }
  .btn-secondary:hover { background: var(--border); }
  .btn-success { background: var(--success); color: #052e16; }
  .btn-warning { background: var(--warning); color: #451a03; }

  /* Status indicator */
  .status-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
  }
  .status-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .status-row:last-child { border-bottom: none; }
  .status-label { font-size: 13px; color: var(--text-secondary); }
  .status-value {
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
  }
  .dot.green { background: var(--success); }
  .dot.red { background: var(--error); }
  .dot.yellow { background: var(--warning); }
  .dot.gray { background: var(--text-secondary); }

  /* Chat tab */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-height: calc(100vh - 260px);
  }
  .msg {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    animation: msgIn 0.3s ease;
  }
  @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user {
    align-self: flex-end;
    background: var(--primary);
    color: white;
    border-bottom-right-radius: 4px;
  }
  .msg.assistant {
    align-self: flex-start;
    background: var(--surface);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }
  .msg.system {
    align-self: center;
    background: transparent;
    color: var(--text-secondary);
    font-size: 12px;
    padding: 6px 12px;
  }
  .msg .timestamp {
    font-size: 10px;
    color: rgba(255,255,255,0.5);
    margin-top: 4px;
    display: block;
  }
  .msg.assistant .timestamp { color: var(--text-secondary); }
  .msg.loading .dots { display: inline-flex; gap: 4px; }
  .msg.loading .dots span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-secondary);
    animation: bounce 1.4s infinite;
  }
  .msg.loading .dots span:nth-child(2) { animation-delay: 0.2s; }
  .msg.loading .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100% { opacity: 0.4; } 40% { opacity: 1; } }
  .msg.loading .timer {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 6px;
    display: block;
  }
  .msg.loading .hint {
    font-size: 11px;
    color: var(--warning);
    margin-top: 2px;
    display: block;
  }

  .chat-input-bar {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
  }
  .chat-input-bar input {
    flex: 1;
    padding: 10px 14px;
    background: var(--surface-2);
    border: 1.5px solid var(--border);
    border-radius: 24px;
    color: var(--text);
    font-size: 14px;
  }
  .chat-input-bar input:focus { outline: none; border-color: var(--primary); }
  .chat-input-bar input::placeholder { color: var(--text-secondary); }
  .chat-input-bar button {
    width: 42px; height: 42px;
    border-radius: 50%;
    border: none;
    background: var(--primary);
    color: white;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .chat-input-bar button:disabled { opacity: 0.4; cursor: not-allowed; }
  .chat-input-bar button:active { background: var(--primary-dark); }

  /* Preset prompts */
  .prompts {
    display: flex;
    gap: 8px;
    padding: 8px 16px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .prompts::-webkit-scrollbar { display: none; }
  .prompt-chip {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .prompt-chip:active { background: var(--primary); color: white; border-color: var(--primary); }

  /* Log tab */
  .log-list {
    padding: 8px 0;
    font-family: "SF Mono", "Cascadia Code", monospace;
    font-size: 12px;
    line-height: 1.6;
  }
  .log-item {
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    color: var(--text-secondary);
    word-break: break-all;
  }
  .log-item .time { color: var(--primary-light); margin-right: 8px; }
  .log-item.info { color: var(--text-secondary); }
  .log-item.success { color: var(--success); }
  .log-item.error { color: var(--error); }

  /* Markdown in messages - simple rendering */
  .msg.assistant p { margin: 4px 0; }
  .msg.assistant code {
    background: rgba(255,255,255,0.08);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 12px;
    font-family: "SF Mono", monospace;
  }
  .msg.assistant pre {
    background: rgba(0,0,0,0.3);
    padding: 10px;
    border-radius: 8px;
    overflow-x: auto;
    font-size: 12px;
    margin: 6px 0;
  }
  .msg.assistant pre code { background: none; padding: 0; }
  .msg.assistant strong { font-weight: 700; }
  .msg.assistant ul, .msg.assistant ol { padding-left: 20px; margin: 4px 0; }
  .msg.assistant li { margin: 2px 0; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface-2);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 24px;
    font-size: 13px;
    font-weight: 500;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 200;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 480px) {
    .chat-messages { padding: 12px 14px; }
    .msg { max-width: 90%; font-size: 13px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Deep Research Agent</h1>
  <div class="subtitle">AgentRun · 移动端测试台</div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="chat">对话</button>
  <button class="tab-btn" data-tab="config">配置</button>
  <button class="tab-btn" data-tab="log">日志</button>
</div>

<!-- Tab: Chat -->
<div class="content active" id="tab-chat">
  <div class="prompts" id="prompts">
    <div class="prompt-chip" data-prompt="用中文介绍你自己，以及你能做什么">自我介绍</div>
    <div class="prompt-chip" data-prompt="帮我深度研究一下2026年AI Agent落地的最新趋势">研究趋势</div>
    <div class="prompt-chip" data-prompt="What are the key differences between RAG and fine-tuning for LLMs?">RAG vs FT</div>
    <div class="prompt-chip" data-prompt="写一篇200字左右的短文，主题是人工智能的未来">短文生成</div>
  </div>
  <div class="chat-messages" id="chat-messages">
    <div class="msg assistant">
      你好！我是 Deep Research Agent，已通过阿里云 AgentRun 部署上线。输入你的问题或选择一个快捷提问开始对话。
      <span class="timestamp">就绪</span>
    </div>
  </div>
  <div class="chat-input-bar">
    <input type="text" id="chat-input" placeholder="输入你的研究问题..." autocomplete="off">
    <button id="send-btn" aria-label="发送">➤</button>
  </div>
</div>

<!-- Tab: Config -->
<div class="content padded" id="tab-config">
  <div class="status-card">
    <div class="status-row">
      <span class="status-label">端点状态</span>
      <span class="status-value"><span class="dot gray" id="status-dot"></span><span id="status-text">未检测</span></span>
    </div>
    <div class="status-row">
      <span class="status-label">智能体</span>
      <span class="status-value" id="config-agent-name">deep-research-web</span>
    </div>
    <div class="status-row">
      <span class="status-label">区域</span>
      <span class="status-value">cn-hangzhou</span>
    </div>
  </div>

  <div class="config-section">
    <label>端点 URL</label>
    <input type="text" id="endpoint-url"
      value="https://1542728231263363.agentrun-data.cn-hangzhou.aliyuncs.com/agent-runtimes/deep-research-web/endpoints/web-service/invocations"
      placeholder="https://{account}.agentrun-data.{region}.aliyuncs.com/agent-runtimes/...">
  </div>

  <div class="config-section">
    <label>API Key（如需要）</label>
    <input type="password" id="api-key-input" placeholder="可选">
  </div>

  <div class="config-section">
    <label>模型名称</label>
    <input type="text" id="model-input" value="default" placeholder="default">
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="test-connection-btn">测试连接</button>
    <button class="btn btn-secondary" id="save-config-btn">保存</button>
  </div>
  <div class="btn-row" style="margin-top:8px">
    <button class="btn btn-warning" id="clear-chat-btn">清空对话</button>
  </div>
</div>

<!-- Tab: Log -->
<div class="content padded" id="tab-log">
  <div class="log-list" id="log-list">
    <div class="log-item info"><span class="time">[系统]</span> 日志记录已启动</div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ========== State ==========
const STATE_KEY = 'agentrun_test_config';
let config = loadConfig();
let isSending = false;

function defaultConfig() {
  return {
    endpoint: 'https://1542728231263363.agentrun-data.cn-hangzhou.aliyuncs.com/agent-runtimes/deep-research-web/endpoints/web-service/invocations',
    apiKey: '',
    model: 'default',
  };
}

function loadConfig() {
  try {
    const raw = localStorage.getItem(STATE_KEY);
    if (raw) return { ...defaultConfig(), ...JSON.parse(raw) };
  } catch(e) {}
  return defaultConfig();
}

function saveConfigToStorage() {
  try { localStorage.setItem(STATE_KEY, JSON.stringify(config)); } catch(e) {}
}

// ========== DOM refs ==========
const $ = id => document.getElementById(id);
const messagesEl = $('chat-messages');
const inputEl = $('chat-input');
const sendBtn = $('send-btn');
const endpointInput = $('endpoint-url');
const apiKeyInput = $('api-key-input');
const modelInput = $('model-input');
const toastEl = $('toast');
const logList = $('log-list');
const statusDot = $('status-dot');
const statusText = $('status-text');

// ========== Toast ==========
let toastTimer;

function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2500);
}

// ========== Log ==========
function addLog(msg, type = 'info') {
  const now = new Date();
  const t = now.toLocaleTimeString('zh-CN', { hour12: false });
  const el = document.createElement('div');
  el.className = `log-item ${type}`;
  el.innerHTML = `<span class="time">[${t}]</span> ${msg}`;
  logList.appendChild(el);
  logList.scrollTop = logList.scrollHeight;
}

// ========== Config ==========
function applyConfigToUI() {
  endpointInput.value = config.endpoint;
  apiKeyInput.value = config.apiKey;
  modelInput.value = config.model;
}
applyConfigToUI();

$('save-config-btn').addEventListener('click', () => {
  config.endpoint = endpointInput.value.trim();
  config.apiKey = apiKeyInput.value.trim();
  config.model = modelInput.value.trim() || 'default';
  saveConfigToStorage();
  showToast('配置已保存');
  addLog('配置已更新保存', 'success');
});

// ========== Test connection ==========
$('test-connection-btn').addEventListener('click', testConnection);

async function testConnection() {
  const baseUrl = endpointInput.value.trim();
  if (!baseUrl) { showToast('请先输入端点 URL'); return; }

  const btn = $('test-connection-btn');
  btn.disabled = true;
  btn.textContent = '检测中...';
  setStatus('yellow', '检测中');

  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 8000);
    const url = baseUrl.replace(/\/+$/, '') + '/openai/v1/chat/completions';

    const res = await fetch(url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        ...(config.apiKey ? { 'Authorization': `Bearer ${config.apiKey}` } : {}),
      },
      body: JSON.stringify({
        model: config.model,
        messages: [{ role: 'user', content: 'Say hello' }],
        max_tokens: 50,
      }),
      signal: controller.signal,
    });
    clearTimeout(timeout);

    if (res.ok) {
      const data = await res.json();
      setStatus('green', '在线 ✓');
      showToast('连接成功！智能体在线');
      addLog(`连接测试通过，返回: ${JSON.stringify(data.choices?.[0]?.message?.content)?.slice(0,80)}`, 'success');
    } else {
      const text = await res.text().catch(() => 'unknown');
      if (res.status === 412) {
        setStatus('yellow', '容器启动中');
        showToast('端点返回 412，容器可能正在启动');
        addLog(`连接返回 412（容器可能未就绪）: ${text.slice(0,100)}`, 'error');
      } else {
        setStatus('red', `错误 ${res.status}`);
        showToast(`响应错误: ${res.status}`);
        addLog(`连接测试失败: ${res.status} ${text.slice(0,100)}`, 'error');
      }
    }
  } catch (err) {
    const msg = err.name === 'AbortError' ? '连接超时' : err.message;
    setStatus('red', '不可达');
    showToast(`连接失败: ${msg}`);
    addLog(`连接错误: ${msg}`, 'error');
  }
  btn.disabled = false;
  btn.textContent = '测试连接';
}

function setStatus(color, text) {
  statusDot.className = `dot ${color}`;
  statusText.textContent = text;
}

// ========== Chat ==========
function addMessage(content, role, timestamp) {
  const el = document.createElement('div');
  el.className = `msg ${role}`;

  if (role === 'loading') {
    el.className = 'msg assistant loading';
    el.innerHTML = '<div class="dots"><span></span><span></span><span></span></div><span class="timer" id="loading-timer">⏳ 研究中，已等待 0 秒...</span><span class="hint">深度调研可能需要 1-3 分钟，请耐心等待</span>';
    el.id = 'loading-msg';
  } else {
    el.innerHTML = renderMarkdown(content);
    const ts = document.createElement('span');
    ts.className = 'timestamp';
    ts.textContent = timestamp || new Date().toLocaleTimeString('zh-CN', { hour12: false });
    el.appendChild(ts);
  }
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeLoading() {
  const el = document.getElementById('loading-msg');
  if (el) el.remove();
}

function renderMarkdown(text) {
  if (!text) return '';
  let html = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    // code blocks
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    // inline code
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    // bold
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    // italic
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    // newlines
    .replace(/\n/g, '<br>');
  return html;
}

async function sendMessage(text) {
  if (!text.trim() || isSending) return;
  const baseUrl = config.endpoint;
  if (!baseUrl) { showToast('请先在配置标签页设置端点 URL'); return; }

  isSending = true;
  sendBtn.disabled = true;
  inputEl.disabled = true;
  inputEl.value = '';

  addMessage(text, 'user');
  addMessage('', 'loading');

  // 启动计时器，实时更新等待时间
  let elapsed = 0;
  const timerInterval = setInterval(() => {
    elapsed++;
    const timerEl = document.getElementById('loading-timer');
    if (timerEl) {
      if (elapsed < 60) {
        timerEl.textContent = `⏳ 研究中，已等待 ${elapsed} 秒...`;
      } else {
        const min = Math.floor(elapsed / 60);
        const sec = elapsed % 60;
        timerEl.textContent = `⏳ 研究中，已等待 ${min} 分 ${sec} 秒...`;
      }
    }
  }, 1000);

  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 300000); // 5 分钟超时
    const url = baseUrl.replace(/\/+$/, '') + '/openai/v1/chat/completions';

    const res = await fetch(url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        ...(config.apiKey ? { 'Authorization': `Bearer ${config.apiKey}` } : {}),
      },
      body: JSON.stringify({
        model: config.model,
        messages: [{ role: 'user', content: text }],
        stream: false,
      }),
      signal: controller.signal,
    });
    clearTimeout(timeout);
    clearInterval(timerInterval);

    removeLoading();

    if (res.ok) {
      const data = await res.json();
      const reply = data.choices?.[0]?.message?.content || '(空响应)';
      const now = new Date().toLocaleTimeString('zh-CN', { hour12: false });
      addMessage(reply, 'assistant', now);
      addLog(`对话请求成功 (${data.usage?.total_tokens || '?'} tokens，耗时 ${elapsed} 秒)`, 'success');
    } else {
      const errText = await res.text().catch(() => 'unknown');
      addMessage(`请求失败 (${res.status})`, 'assistant');
      addLog(`对话请求失败: ${res.status} ${errText.slice(0,100)}`, 'error');
    }
  } catch (err) {
    clearInterval(timerInterval);
    removeLoading();
    const msg = err.name === 'AbortError' ? `请求超时（已等待 ${elapsed} 秒）` : err.message;
    addMessage(`请求出错: ${msg}`, 'assistant');
    addLog(`对话请求错误: ${msg}`, 'error');
  }

  isSending = false;
  sendBtn.disabled = false;
  inputEl.disabled = false;
  inputEl.focus();
}

// Send on button click
sendBtn.addEventListener('click', () => sendMessage(inputEl.value));

// Send on Enter
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage(inputEl.value);
  }
});

// Prompt chips
document.querySelectorAll('.prompt-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    const prompt = chip.dataset.prompt;
    if (prompt) sendMessage(prompt);
  });
});

// Clear chat
$('clear-chat-btn').addEventListener('click', () => {
  messagesEl.innerHTML = `
    <div class="msg assistant">
      对话已清空。开始新的研究吧！
      <span class="timestamp">清空</span>
    </div>`;
  addLog('对话已清空', 'info');
  showToast('已清空');
});

// ========== Tab switching ==========
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

// ========== Init ==========
addLog('配置已加载，端点: ' + config.endpoint.slice(0, 60) + '...', 'info');
</script>
</body>
</html>
